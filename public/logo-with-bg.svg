<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 60" width="180" height="60">
  <!-- 浅色背景 -->
  <rect width="180" height="60" rx="8" fill="#0f172a"/>

  <!-- OPC 白色 -->
  <text
    x="10" y="42"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Arial, sans-serif"
    font-size="36"
    font-weight="900"
    font-style="italic"
    letter-spacing="-0.5"
    fill="#ffffff">OPC</text>

  <!-- x 紫色 -->
  <text
    x="95" y="42"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Arial, sans-serif"
    font-size="36"
    font-weight="900"
    font-style="italic"
    fill="#818cf8">x</text>

  <!-- AI 紫色 -->
  <text
    x="120" y="42"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Arial, sans-serif"
    font-size="36"
    font-weight="900"
    font-style="italic"
    letter-spacing="-0.5"
    fill="#818cf8">AI</text>
</svg>
